title = "Gitleaks Configuration"

# Custom rules and allowlist for CompanyManagementSystem

[allowlist]
  description = "Global allowlist"
  paths = [
    '''\.gitleaks\.toml$''',
    '''(.*?)(test|spec|mock)(.*?)\.cs$''',
    '''commit\.txt$''',
  ]

# Allow example/placeholder values that are clearly not real secrets
  regexTarget = "match"
  regexes = [
    '''REPLACE_WITH_''',
    '''your[-_]?api[-_]?key[-_]?here''',
    '''<YOUR_.*?>''',
    '''example\.com''',
  ]
